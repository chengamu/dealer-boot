services:
  nginx:
    image: nginx:1.27-alpine
    container_name: base-boot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/base-boot.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin-ui
      - minio

  postgres:
    image: postgres:16-alpine
    container_name: base-boot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: base-boot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: base-boot-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: UTC
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    ports:
      - "127.0.0.1:19000:9000"

  bocoo-admin:
    image: eclipse-temurin:17-jre
    container_name: bocoo-admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      ai-runtime:
        condition: service_started
    environment:
      TZ: UTC
      SPRING_PROFILES_ACTIVE: prod
      SA_TOKEN_JWT_SECRET: ${SA_TOKEN_JWT_SECRET}
      CRYPTO_AES_KEY: ${CRYPTO_AES_KEY}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BOCOO_AI_ENABLED: ${BOCOO_AI_ENABLED:-false}
      BOCOO_AI_DEFAULT_MODEL: ${BOCOO_AI_DEFAULT_MODEL:-deepseek-v4-flash}
      BOCOO_AI_PAGE_AGENT_BASE_URL: /ai-runtime/page-agent
      BOCOO_AI_SECRET_ENCRYPTION_KEY: ${BOCOO_AI_SECRET_ENCRYPTION_KEY}
      BOCOO_AI_CHANNEL_TOKEN_SECRET: ${BOCOO_AI_CHANNEL_TOKEN_SECRET}
      AI_RUNTIME_BASE_URL: http://ai-runtime:18088
    volumes:
      - ./bocoo-admin.jar:/app/bocoo-admin.jar:ro
      - ./config:/config:ro
      - ./logs:/logs
    expose:
      - "8081"
    entrypoint:
      - java
      - -Xms512m
      - -Xmx1024m
      - -Dfile.encoding=UTF-8
      - -Duser.timezone=UTC
      - -jar
      - /app/bocoo-admin.jar
      - --spring.config.additional-location=/config/

  ai-runtime:
    build:
      context: ../../../ai-runtime
      dockerfile: Dockerfile
    container_name: ai-runtime
    restart: unless-stopped
    environment:
      AI_RUNTIME_ADDR: 0.0.0.0:18088
      AI_JAVA_INTERNAL_BASE_URL: http://bocoo-admin:8081
      AI_SERVICE_NAME: ${AI_SERVICE_NAME:-ai-runtime}
      AI_SERVICE_KEY_VERSION: ${AI_SERVICE_KEY_VERSION}
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}
      AI_RUNTIME_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_RUNTIME_DB}?sslmode=disable
      AI_PROVIDER_TIMEOUT_SECONDS: ${AI_PROVIDER_TIMEOUT_SECONDS:-120}
    expose:
      - "18088"

  admin-ui:
    image: base-boot-admin-ui:latest
    container_name: admin-ui
    restart: unless-stopped
    build:
      context: ../../admin-ui
      dockerfile: Dockerfile
    environment:
      API_PROXY_PASS: http://bocoo-admin:8081
      AI_RUNTIME_PROXY_PASS: http://ai-runtime:18088
    ports:
      - "127.0.0.1:18080:80"
    depends_on:
      - bocoo-admin
