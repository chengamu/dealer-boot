services:
  postgres:
    image: postgres:16-alpine
    container_name: base-boot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: dealer
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - base_boot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d dealer"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: base-boot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - base_boot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  base_boot_postgres_data:
  base_boot_redis_data:
