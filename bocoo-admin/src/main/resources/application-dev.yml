# MQTT相关配置
mqtt:
  device:
    load:
      # 是否启用设备自动加载功能，默认启用? 开发环境?禁用~ 不然会导致和服务器冲突；
      enabled: false
# websocket配置
websocket:
  port: 2831
  sendUserid: 1966049982171709442

--- # 开发环境安全配置
sa-token:
  jwt-secret-key: bocoo-dev-jwt-secret-change-before-prod-2026

crypto:
  aes-key: DevCryptoKey2026

captcha:
  enable: true

web:
  cors:
    allow-credentials: true
    allowed-origin-patterns:
      - http://*:*
      - https://*:*
    allowed-headers:
      - "*"
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    max-age: 1800

--- # 数据源配置
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    # 动态数据源文档 https://www.kancloud.cn/tracy5546/dynamic-datasource/content
    dynamic:
      # 性能分析插件(有性能损耗?不建议生产环境使用?
      p6spy: true
      # 设置默认的数据源或者数据源组?默认值即为master
      primary: master
      # 严格模式 匹配不到数据源则报错
      strict: true
      datasource:
        # 主库数据源
        master:
          type: ${spring.datasource.type}
          driverClassName: org.postgresql.Driver
          url: jdbc:postgresql://localhost:5432/dealer?stringtype=unspecified
          username: root
          password: 123456
#        # mqtt数据源
#        mqtt:
#          lazy: true
#          type: ${spring.datasource.type}
#          driverClassName: com.mysql.cj.jdbc.Driver
#          url: jdbc:mysql://192.168.120.67:13306/emqx_mqtt?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true
#          username: root
#          password: 123456
#         # tdengine数据源
#        tdbd:
#          lazy: true
#          type: ${spring.datasource.type}
#          #原生链接方式需要DLL文件有点麻烦
#          #driverClassName: com.taosdata.jdbc.TSDBDriver
#          #url: url: jdbc:TAOS://192.168.120.66:6041/sensordb
#          driverClassName: com.taosdata.jdbc.rs.RestfulDriver
#          url: jdbc:TAOS-RS://192.168.120.67:6041/sensordb?timezone=Asia/Shanghai
#          username: root
#          password: bocoo123
      hikari:
        # 最大连接池数量
        maxPoolSize: 20
        # 最小空闲线程数量
        minIdle: 10
        # 配置获取连接等待超时的时间
        connectionTimeout: 30000
        # 校验超时时间
        validationTimeout: 5000
        # 空闲连接存活最大时间，默认10分钟
        idleTimeout: 600000
        # 此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认30分钟
        maxLifetime: 1800000
        # 多久检查一次连接的活性
        keepaliveTime: 30000
        # PostgreSQL 统一使用 UTC 会话，避免 timestamptz 与 LocalDateTime 相互转换时发生 8 小时偏移
        connectionInitSql: SET TIME ZONE 'UTC'

--- # redis 单机配置(单机与集群只能开启一个另一个需要注释掉)
spring.data:
  redis:
    # 地址
    host: 127.0.0.1
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # 密码(如没有密码请注释掉)
    password: s7DEOfbyIQoKhg79WGxUR6eK
    # 连接超时时间
    timeout: 10s
    # 是否开启ssl
    ssl.enabled: false

redisson:
  # redis key前缀
  keyPrefix:
  # 线程池数量
  threads: 4
  # Netty线程池数量
  nettyThreads: 8
  # 单节点配置
  singleServerConfig:
    # 客户端名称
    clientName: ${bocoo.name}
    # 最小空闲连接数
    connectionMinimumIdleSize: 8
    # 连接池大小
    connectionPoolSize: 32
    # 连接空闲超时，单位：毫秒
    idleConnectionTimeout: 10000
    # 命令等待超时，单位：毫秒 18073784154
    timeout: 3000
    # 发布和订阅连接池大小
    subscriptionConnectionPoolSize: 50

--- # mail 邮件发送
mail:
  enabled: true
  host: smtp.163.com
  port: 465
  # 是否需要用户名密码验证
  auth: true
  # 发送方，遵循RFC-822标准
  from: 15005754277@163.com
  # 用户名（注意：如果使用foxmail邮箱，此处user为qq号）
  user: 15005754277@163.com
  # 密码（注意，某些邮箱需要为SMTP服务单独设置密码，详情查看相关帮助）
  pass: HWdaazwMzjiqWYbt
  # 使用 STARTTLS安全连接，STARTTLS是对纯文本通信协议的扩展。
  starttlsEnable: true
  # 使用SSL安全连接
  sslEnable: true
  # SMTP超时时长，单位毫秒，缺省值不超时
  timeout: 0
  # Socket连接超时值，单位毫秒，缺省值不超时
  connectionTimeout: 0

--- # sms 短信 支持 阿里云?腾讯云?云片 等等各式各样的短信服务商
# https://wind.kim/doc/start 文档地址 各个厂商可同时使用
sms:
  # 阿里云 dysmsapi.aliyuncs.com
  alibaba:
    #请求地址 默认为 dysmsapi.aliyuncs.com 如无特殊改变可以不用设置
    requestUrl: dysmsapi.aliyuncs.com
    #阿里云的accessKey
    accessKeyId: xxxxxxx
    #阿里云的accessKeySecret
    accessKeySecret: xxxxxxx
    #短信签名
    signature: 测试
  tencent:
    #请求地址默认为 sms.tencentcloudapi.com 如无特殊改变可以不用设置
    requestUrl: sms.tencentcloudapi.com
    #腾讯云的accessKey
    accessKeyId: xxxxxxx
    #腾讯云的accessKeySecret
    accessKeySecret: xxxxxxx
    #短信签名
    signature: 测试
    #短信sdkAppId
    sdkAppId: appid
    #地域信息默认为 ap-guangzhou 如无特殊改变可以不用设置
    territory: ap-guangzhou
# SpringDoc 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true  # 显示请求耗时
    filter: true                    # 启用搜索过滤
    try-it-out-enabled: true        # 启用Try it out功能
    default-model-expand-depth: 1   # 默认展开模型层级

  api-docs:
    path: /v3/api-docs
    groups:
      enabled: true

  # 分组配置
  group-configs:
    - group: '系统模块'
      display-name: '系统管理接口'
      paths-to-match: '/**'
      packages-to-scan: 'com.bocoo.system.controller'

    - group: '代码生成'
      display-name: 'generator接口'
      paths-to-match: '/**'
      packages-to-scan: 'com.bocoo.generator.controller'



# Knife4j 增强配置（优化版）
knife4j:
  enable: true
  production: false  # 生产环境建议改为true
  basic:
    enable: true
    username: bocoo
    password: bocoo@123  # 建议使用更强密码
  setting:
    language: zh-CN                # 固定中文配置
    enable-footer: true            # 启用页脚
    footer-custom-content: "amumu © 2025"  # 自定义页脚
    enable-group: true             # 启用分组标签
    enable-request-cache: true     # 启用请求缓存
    enable-document-manage: true   # 启用文档管理
    swagger-model-name: "数据模型"         # 清空模型标题（隐藏数据模型）
# Actuator 监控端点的配置项
management:
  endpoints:
    web:
      exposure:
        include: health  # 仅开放必要端点
