# docker compose logs -f bocoo-admin
services:
  bocoo-admin:
    container_name: bocoo-admin
    restart: always
    image: openjdk:17
    network_mode: host
    volumes:
      - ./bocoo-admin.jar:/app/bocoo-admin.jar
      - ./config:/config
      - ./logs:/logs
    environment:
      TZ: UTC
      SPRING_PROFILES_ACTIVE: dev
      SA_TOKEN_JWT_SECRET: ${SA_TOKEN_JWT_SECRET:-bocoo-dev-jwt-secret-change-before-prod-2026}
      CRYPTO_AES_KEY: ${CRYPTO_AES_KEY:-DevCryptoKey2026}
    entrypoint:
      - java
      - -Xms1g
      - -Xmx1g
      - -XX:ReservedCodeCacheSize=512m
      - -Dfile.encoding=UTF-8
      - -Duser.timezone=UTC
      - -jar
      - /app/bocoo-admin.jar
      - --spring.config.location=/config/
