services:
  hk-agent:
    image: hk-agent:latest
    build: .
    container_name: hk-agent
    restart: unless-stopped
    ports:
      - "8493:8493"
    env_file:
      - /opt/hk-agent/config/.env
    environment:
      HK_AGENT_HOST: 0.0.0.0
      HK_AGENT_PORT: 8493
      HK_AGENT_RELOAD: 0
      HK_AGENT_REPORT_DIR: /data/reports
    volumes:
      - /opt/hk-agent/data/reports:/data/reports
