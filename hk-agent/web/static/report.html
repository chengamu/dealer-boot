<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>布料裁剪工艺指导卡</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f7;
      --paper: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #d7deea;
      --line-strong: #aeb8c7;
      --accent: #2563eb;
      --accent-soft: #e8f0ff;
      --ok: #0f766e;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    button, .button-link {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      padding: 8px 13px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    button.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(238, 242, 247, .9);
      backdrop-filter: blur(12px);
    }
    .crumb, .actions, .print-options {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .crumb { color: var(--muted); font-size: 14px; }
    .print-options label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    main {
      width: min(1440px, calc(100vw - 32px));
      margin: 22px auto 52px;
    }
    .sheet {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--paper);
      box-shadow: 0 22px 55px rgba(15, 23, 42, .1);
    }
    .report-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 22px;
      padding: 28px 30px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #fff, #f8fbff);
    }
    h1 { margin: 0; font-size: clamp(25px, 3vw, 40px); line-height: 1.16; }
    .summary { margin-top: 10px; color: #334155; line-height: 1.65; }
    .stamp {
      min-width: 220px;
      align-self: start;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
    }
    .stamp strong { display: block; margin-top: 5px; color: var(--ink); font-size: 28px; }
    .section {
      padding: 24px 30px;
      border-bottom: 1px solid var(--line);
    }
    .section:last-child { border-bottom: 0; }
    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    h2 { margin: 0; font-size: 18px; line-height: 1.3; }
    .hint { margin: 0; color: var(--muted); font-size: 13px; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }
    .metric {
      min-height: 76px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px;
      background: #fff;
    }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .metric strong { display: block; margin-top: 5px; font-size: 20px; line-height: 1.14; }
    .plans {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
    }
    .plan-card {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }
    .plan-card.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px var(--accent);
    }
    .plan-card.unavailable { border-color: #fecaca; background: #fff1f2; color: var(--danger); }
    .plan-top { display: flex; justify-content: space-between; gap: 10px; }
    .badge {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--muted);
      background: #fff;
      font-size: 12px;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    table {
      width: 100%;
      min-width: 820px;
      border-collapse: collapse;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      font-size: 13px;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: #334155;
      background: #f8fafc;
      font-weight: 800;
    }
    tbody tr:nth-child(even) td { background: #fbfdff; }
    tr:last-child td { border-bottom: 0; }
    .markdown {
      max-width: 980px;
      color: #334155;
      line-height: 1.75;
    }
    .markdown h1, .markdown h2, .markdown h3, .markdown h4 { margin: 18px 0 9px; color: var(--ink); }
    .markdown p { margin: 0 0 10px; }
    .markdown ul, .markdown ol { margin: 8px 0 10px 22px; padding: 0; }
    .markdown strong { color: var(--ink); }
    .drawing-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .drawing-shell {
      overflow: auto;
      max-height: 72vh;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }
    .drawing-inner { min-width: 0; padding: 18px; }
    .drawing-inner svg { display: block; width: 100%; height: auto; }
    details summary {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 8px 14px;
      color: var(--accent);
      background: #eff6ff;
      cursor: pointer;
      font-weight: 700;
    }
    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: 12px;
      padding: 18px;
      color: var(--muted);
      background: #fafbfc;
    }
    @media (max-width: 900px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      main { width: 100%; margin: 0; }
      .sheet { border-radius: 0; border-left: 0; border-right: 0; }
      .report-head { grid-template-columns: 1fr; padding: 22px 18px; }
      .section { padding: 20px 18px; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .section-title { align-items: flex-start; flex-direction: column; }
    }
    @media print {
      @page { size: A4 landscape; margin: 8mm; }
      body { background: #fff; }
      .topbar { display: none; }
      main { width: auto; margin: 0; }
      .sheet { border: 0; border-radius: 0; box-shadow: none; }
      .report-head { display: none; }
      .section:not(.print-table):not(.print-drawing), .print-note { display: none !important; }
      .section { padding: 10px 0; break-inside: avoid; }
      .metrics { grid-template-columns: repeat(6, 1fr); gap: 5px; }
      .metric { min-height: 0; padding: 6px; border-radius: 0; }
      .metric span { font-size: 9px; }
      .metric strong { font-size: 12px; }
      th, td { padding: 5px 7px; font-size: 10px; }
      th { position: static; }
      table { min-width: 0; }
      .drawing-shell { max-height: none; overflow: visible; }
      .drawing-inner { min-width: 0; padding: 0; }
      body.print-no-tables .print-table { display: none !important; }
      body.print-no-drawing .print-drawing { display: none !important; }
      body.print-no-note .print-note { display: none !important; }
      details:not([open]) > *:not(summary) { display: block; }
      details summary { display: none; }
    }
  </style>
</head>
<body>
  <nav class="topbar" aria-label="报告操作">
    <div class="crumb">
      <a href="/" class="button-link">返回工作台</a>
      <span>HK Agent</span>
      <span>/</span>
      <span>工艺指导卡</span>
    </div>
    <div class="actions">
      <div class="print-options">
        <label><input id="printTables" type="checkbox" checked> 表格</label>
        <label><input id="printDrawing" type="checkbox" checked> 图纸</label>
        <label><input id="printNote" type="checkbox"> 工艺说明</label>
      </div>
      <button type="button" onclick="location.href='/'">新订单</button>
      <button type="button" class="primary" onclick="printReport()">打印</button>
    </div>
  </nav>

  <main>
    <article class="sheet">
      <header class="report-head">
        <div>
          <h1 id="title">布料裁剪工艺指导卡</h1>
          <div id="summary" class="summary"></div>
        </div>
        <aside class="stamp">
          推荐门幅
          <strong id="recommendedWidth">-</strong>
        </aside>
      </header>

      <section class="section">
        <div class="section-title">
          <h2>关键指标</h2>
          <p class="hint">订单、产品、推荐方案摘要和报告生成费用</p>
        </div>
        <div id="metrics" class="metrics"></div>
      </section>

      <section class="section">
        <div class="section-title">
          <h2>方案对比</h2>
          <p class="hint">按损耗率、总用料和用料长度综合推荐</p>
        </div>
        <div id="plans" class="plans"></div>
      </section>

      <section class="section print-table">
        <div class="section-title">
          <h2>整理后的裁剪清单</h2>
          <p class="hint">裁片编号会同步标注在图中；原始行用于追溯粘贴清单</p>
        </div>
        <div id="parsed"></div>
      </section>

      <section class="section print-table">
        <div class="section-title">
          <h2>裁片坐标清单</h2>
          <p class="hint">默认只展示当前选中门幅方案；大货按规格汇总图纸但坐标表保留完整数据</p>
        </div>
        <div id="placements"></div>
      </section>

      <section class="section print-note">
        <div class="section-title">
          <h2>工艺说明</h2>
        </div>
        <div id="explanation" class="markdown"></div>
      </section>

      <section class="section print-drawing">
        <div class="section-title">
          <h2 id="drawingTitle">裁剪示意图</h2>
          <p class="hint">图纸默认折叠，避免长报告打开时卡顿；大货只画代表规格</p>
        </div>
        <details id="drawingDetails">
          <summary>展开裁剪示意图</summary>
          <div class="drawing-toolbar">
            <div id="drawingSummary"></div>
            <div id="drawingFilters"></div>
          </div>
          <div class="drawing-shell">
            <div id="drawing" class="drawing-inner"></div>
          </div>
        </details>
      </section>
    </article>
  </main>

  <script>
    const reportId = location.pathname.split('/').filter(Boolean).pop();
    const fmt = (value, digits = 2) => Number(value || 0).toFixed(digits);
    const pct = value => `${fmt((value || 0) * 100, 2)}%`;
    let reportData = null;
    let selectedWidth = null;

    fetch(`/api/reports/${reportId}`)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(render)
      .catch(error => {
        document.querySelector('main').innerHTML = `<div class="sheet"><section class="section"><div class="empty">报告加载失败：${escapeHtml(error.message)}</div></section></div>`;
      });

    function render(data) {
      reportData = data;
      const summary = data.report_summary || {};
      document.getElementById('title').textContent = data.request?.order_title || '布料裁剪工艺指导卡';
      document.getElementById('summary').textContent = data.summary || '';
      document.getElementById('recommendedWidth').textContent = data.recommended_material_width ? `${data.recommended_material_width}m` : '-';
      selectedWidth = data.recommended_material_width || (data.plans || []).find(plan => plan.feasible)?.material_width;
      renderMetrics(summary);
      renderPlans();
      renderSelectedPlan();
      document.getElementById('parsed').innerHTML = wrapTable(buildParsedTable(data.request?.pieces || [], data.height_extra || 0));
      const parseNote = data.llm_parse_error ? `模型整理失败，已使用本地解析兜底：${data.llm_parse_error}\n\n` : '';
      document.getElementById('explanation').innerHTML = markdown(parseNote + (data.llm_explanation || data.summary || ''));
    }

    function renderMetrics(summary) {
      const request = reportData.request || {};
      const rules = request.business_rules || {};
      const plan = selectedPlan();
      const product = summary.product_label || productLabel(rules.fabric_type);
      const orderType = summary.order_type_label || orderTypeLabel(rules.order_type);
      document.getElementById('metrics').innerHTML = [
        metric('订单号', request.order_no || 'AUTO'),
        metric('产品', product),
        metric('订单类型', orderType),
        metric('推荐门幅', reportData.recommended_material_width ? `${reportData.recommended_material_width}m` : '-'),
        metric('用料长度', plan ? `${fmt(plan.used_length)}m` : '-'),
        metric('采购总长', plan ? `${fmt(plan.total_material_length || plan.used_length)}m` : '-'),
        metric('卷数', plan ? `${plan.roll_count || 1}卷` : '-'),
        metric('损耗率', plan ? pct(plan.waste_rate) : '-'),
        metric('裁片行数', String((request.pieces || []).length)),
        metric('裁片数量', String((request.pieces || []).reduce((sum, item) => sum + Number(item.quantity || 0), 0))),
        metric('倍率', `${rules.height_multiplier || fabricHeightMultiplier()}×`),
        metric('报告生成费用', fmt(summary.llm_cost || reportData.usage_summary?.estimated_cost || 0, 4)),
      ].join('');
    }

    function renderPlans() {
      const plans = reportData?.plans || [];
      document.getElementById('plans').innerHTML = plans.map(plan => `
        <button type="button" class="plan-card ${plan.material_width === selectedWidth ? 'selected' : ''} ${!plan.feasible ? 'unavailable' : ''}" ${plan.feasible ? `onclick="selectPlan(${plan.material_width})"` : 'disabled'}>
          <div class="plan-top">
            <strong>${plan.material_width}m 门幅</strong>
            <span class="badge">${plan.material_width === selectedWidth ? '当前查看' : (plan.feasible ? '点此查看' : '不可用')}</span>
          </div>
          ${plan.feasible ? `
            <div>用料 ${fmt(plan.used_length)}m / 采购 ${fmt(plan.total_material_length || plan.used_length)}m</div>
            <div>卷数 ${plan.roll_count || 1} 卷 / 损耗 ${pct(plan.waste_rate)}</div>
          ` : `<div>${escapeHtml(plan.reason || '该门幅不可用')}</div>`}
        </button>
      `).join('');
    }

    function selectPlan(width) {
      selectedWidth = width;
      renderPlans();
      renderSelectedPlan();
      renderMetrics(reportData.report_summary || {});
    }

    function renderSelectedPlan() {
      const plan = selectedPlan();
      if (!plan) {
        document.getElementById('drawing').innerHTML = '<div class="empty">没有可用方案。</div>';
        return;
      }
      document.getElementById('drawingTitle').textContent = `${plan.material_width}m 门幅裁剪示意图`;
      document.getElementById('drawingSummary').innerHTML = `门幅 ${plan.material_width}m，${isBulk() ? '大货规格代表图' : '完整追溯图'}；用料 ${fmt(plan.used_length)}m，采购 ${fmt(plan.total_material_length || plan.used_length)}m，卷数 ${plan.roll_count || 1} 卷`;
      document.getElementById('placements').innerHTML = wrapTable(buildPlacementTable(plan.placements || []));
      document.getElementById('drawing').innerHTML = buildSvg(plan);
    }

    function selectedPlan() {
      const plans = reportData?.plans || [];
      return plans.find(p => p.material_width === selectedWidth) || plans.find(p => p.feasible);
    }

    function buildPlacementTable(rows) {
      return `
        <table>
          <thead><tr><th>裁片编号</th><th>组号</th><th>卷号</th><th>X(m)</th><th>Y(m)</th><th>裁剪宽(m)</th><th>裁剪高(m)</th><th>原始成品尺寸(m)</th></tr></thead>
          <tbody>
            ${rows.map(p => `
              <tr>
                <td>${pieceCode(p)}</td>
                <td>${groupLabel(p)}</td>
                <td>第${p.roll_index || 1}卷</td>
                <td>${fmt(p.x)}</td>
                <td>${fmt(p.y)}</td>
                <td>${fmt(p.width)}</td>
                <td>${fmt(p.height)}</td>
                <td>${fmt(p.original_width)} × ${fmt(p.original_height)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function buildParsedTable(rows, heightExtra) {
      const multiplier = fabricHeightMultiplier();
      return `
        <table>
          <thead><tr><th>裁片编号</th><th>来源</th><th>成品宽(m)</th><th>成品高(m)</th><th>加高(m)</th><th>倍率</th><th>裁剪高(m)</th><th>数量</th></tr></thead>
          <tbody>
            ${rows.map(p => {
              const fakePlacement = { piece_id: p.id, quantity_index: 1 };
              const cutHeight = (Number(p.height) + Number(heightExtra)) * multiplier;
              return `
                <tr>
                  <td>${pieceCode(fakePlacement)}</td>
                  <td>第${p.id}行</td>
                  <td>${fmt(p.width, 3)}</td>
                  <td>${fmt(p.height, 3)}</td>
                  <td>${fmt(heightExtra, 2)}</td>
                  <td>${multiplier}×</td>
                  <td>${fmt(cutHeight, 3)}</td>
                  <td>${p.quantity}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    function buildSvg(plan) {
      const scale = isBulk() ? 86 : 72;
      const displayPlacements = drawingPlacements(plan);
      const fabricWidth = Math.max(plan.material_width * scale, 160);
      const canvasWidth = Math.max(fabricWidth, 760);
      const rollFrames = buildRollFrames(displayPlacements, scale);
      const height = rollFrames.reduce((sum, frame) => sum + frame.height, 0) + Math.max(rollFrames.length - 1, 0) * 58;
      const frames = rollFrames.map(frame => `
        <text x="0" y="${frame.offset - 12}" font-size="12" font-weight="800" fill="#111827">第 ${frame.roll} 卷，代表图已切 ${fmt(frame.usedLength)}m</text>
        <rect x="0" y="${frame.offset}" width="${fabricWidth}" height="${frame.height}" fill="#ffffff" stroke="#111827" stroke-width="2"/>
      `).join('');
      const rects = displayPlacements.map((p, index) => {
        const x = p.x * scale;
        const rollOffset = rollFrames.find(frame => frame.roll === (p.roll_index || 1))?.offset || 0;
        const y = rollOffset + p.y * scale;
        const w = Math.max(p.width * scale, 18);
        const h = Math.max(p.height * scale, 18);
        const color = ['#d9e7ff', '#dff3e7', '#fff0cf', '#f7dddd', '#e9e0ff', '#d9f0f5'][index % 6];
        return `
          <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="${color}" stroke="#263445" stroke-width="1"/>
          <text x="${x + 6}" y="${y + 17}" font-size="12" font-weight="800" fill="#132033">${pieceCode(p)}</text>
          ${h > 42 ? `<text x="${x + 6}" y="${y + 35}" font-size="11" fill="#334155">${fmt(p.width)}×${fmt(p.height)}m</text>` : ''}
        `;
      }).join('');
      return `
        <svg viewBox="-20 -26 ${canvasWidth + 40} ${height + 48}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${plan.material_width}m 门幅裁剪示意图">
          ${frames}
          ${rects}
        </svg>
      `;
    }

    function drawingPlacements(plan) {
      const rows = plan.placements || [];
      if (!isBulk()) return rows;
      const seen = new Set();
      return rows.filter(p => {
        const key = `${p.original_width}-${p.original_height}-${p.width}-${p.height}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function buildRollFrames(rows, scale) {
      const rollCount = Math.max(1, ...rows.map(p => p.roll_index || 1));
      let offset = 0;
      return Array.from({ length: rollCount }, (_, index) => {
        const roll = index + 1;
        const usedLength = Math.max(0, ...rows.filter(p => (p.roll_index || 1) === roll).map(p => Number(p.y || 0) + Number(p.height || 0)));
        const height = Math.max(usedLength * scale, 150);
        const frame = { roll, usedLength, height, offset };
        offset += height + 58;
        return frame;
      });
    }

    function isBulk() {
      return reportData?.request?.business_rules?.order_type === 'bulk';
    }

    function fabricHeightMultiplier() {
      return Number(reportData?.request?.business_rules?.height_multiplier || (reportData?.request?.business_rules?.fabric_type === 'zebra_blind' ? 2 : 1));
    }

    function productLabel(value) {
      const products = reportData?.config_snapshot?.products || [];
      return products.find(item => item.key === value)?.label || (value === 'zebra_blind' ? '斑马帘' : value === 'roller_blind' ? '卷帘' : value || '-');
    }

    function orderTypeLabel(value) {
      const orderTypes = reportData?.config_snapshot?.order_types || [];
      return orderTypes.find(item => item.key === value)?.label || (value === 'bulk' ? '大货' : value === 'custom' ? '定制' : value || '-');
    }

    function pieceCode(p) {
      const row = String(p.piece_id).padStart(3, '0');
      return Number(p.quantity_index || 1) > 1 ? `C${row}-${p.quantity_index}` : `C${row}`;
    }

    function groupLabel(p) {
      return `第${p.group_no || 1}组`;
    }

    function wrapTable(tableHtml) {
      return `<div class="table-wrap">${tableHtml}</div>`;
    }

    function metric(label, value) {
      return `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(String(value ?? '-'))}</strong></div>`;
    }

    function markdown(text) {
      const escaped = escapeHtml(text || '');
      return escaped
        .replace(/^####\s(.+)$/gm, '<h4>$1</h4>')
        .replace(/^###\s(.+)$/gm, '<h3>$1</h3>')
        .replace(/^##\s(.+)$/gm, '<h2>$1</h2>')
        .replace(/^#\s(.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^\s*[-*]\s(.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .split(/\n{2,}/)
        .map(block => /^<h\d|^<ul/.test(block) ? block : `<p>${block.replace(/\n/g, '<br>')}</p>`)
        .join('');
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function printReport() {
      document.body.classList.toggle('print-no-tables', !document.getElementById('printTables').checked);
      document.body.classList.toggle('print-no-drawing', !document.getElementById('printDrawing').checked);
      document.body.classList.toggle('print-no-note', !document.getElementById('printNote').checked);
      document.getElementById('drawingDetails').open = document.getElementById('printDrawing').checked;
      window.print();
    }
  </script>
</body>
